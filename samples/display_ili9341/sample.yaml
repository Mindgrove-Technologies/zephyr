sample:
  description: SPI application sample, the simplest Zephyr
    application
  name: display_ili9341  
common:
  tags: introduction
  integration_platforms:
    - native_posix
  harness: console
  harness_config:
    type: one_line
    regex:
      - "display_ili9341! (.*)"
tests:
  sample.display_ili9341:
    tags: introduction

